<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #272727;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #3ea6ff;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .stats {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #272727;
    }

    .stat {
      flex: 1;
      text-align: center;
      padding: 8px;
      background: #222;
      border-radius: 8px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #3ea6ff;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #272727;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }

    .checkbox-row input[type="checkbox"] {
      accent-color: #3ea6ff;
      width: 16px;
      height: 16px;
    }

    .checkbox-row label {
      cursor: pointer;
      color: #ccc;
    }

    .input-group {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .input-group input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e8e8e8;
      font-size: 13px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #3ea6ff;
    }

    .input-group input::placeholder {
      color: #555;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-add {
      background: #3ea6ff;
      color: #000;
    }

    .btn-add:hover {
      background: #65b8ff;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #272727;
      border-radius: 14px;
      font-size: 12px;
      color: #ccc;
    }

    .tag-remove {
      cursor: pointer;
      color: #888;
      font-size: 14px;
      line-height: 1;
    }

    .tag-remove:hover {
      color: #ff4444;
    }

    .empty-msg {
      color: #555;
      font-size: 12px;
      font-style: italic;
    }

    .status-bar {
      padding: 10px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }

    .status-active {
      color: #4caf50;
    }

    .status-inactive {
      color: #888;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>AlgoControl</h1>
    <div class="toggle-container">
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="hiddenCount">0</div>
      <div class="stat-label">Hidden</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">Scanned</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="trackedCount">0</div>
      <div class="stat-label">Tracked</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Quick Filters</div>
    <div class="checkbox-row">
      <input type="checkbox" id="hideShorts">
      <label for="hideShorts">Hide YouTube Shorts</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Blocked Keywords</div>
    <div class="input-group">
      <input type="text" id="keywordInput" placeholder="e.g. drama, reaction, prank">
      <button class="btn btn-add" id="addKeyword">Add</button>
    </div>
    <div class="tag-list" id="keywordTags"></div>
  </div>

  <div class="section">
    <div class="section-title">Blocked Channels</div>
    <div class="input-group">
      <input type="text" id="channelInput" placeholder="e.g. TMZ, DramaAlert">
      <button class="btn btn-add" id="addChannel">Add</button>
    </div>
    <div class="tag-list" id="channelTags"></div>
  </div>

  <div class="status-bar">
    <span id="statusText" class="status-active">Active on YouTube</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
